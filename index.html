<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">

  <title>Cartinha Pra Você 💖</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- MÚSICA -->
  <audio id="musica" loop>
    <source src="Fico Assim Sem Você.mpeg" type="audio/mpeg">
  </audio>

  <!-- BOTÃO -->
  <button id="playMusic">▶ Play Music</button>

  <div class="container">

    <!-- FOTO -->
    <img src="foto1.jpeg" class="foto">

    <!-- ENVELOPE -->
    <div class="envelope" onclick="abrirCarta()">

      <div class="tampa"></div>

      <div class="corpo"></div>

      <div class="coracao">❤️</div>

      <!-- CARTA -->
      <div class="carta">

        <p>Mãe, minha flor, minha rainha! 💖</p>

        <!-- CARROSSEL -->
        <div class="carrossel">

          <div class="slides" id="slides">

            <img src="foto2.jpeg" class="slide">

            <img src="foto3.jpeg" class="slide">

            <img src="foto4.jpeg" class="slide">

          </div>

        </div>

        <!-- BOLINHAS -->
        <div class="indicador">

          <div class="bolinha ativa"></div>

          <div class="bolinha"></div>

          <div class="bolinha"></div>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
